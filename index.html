<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <title>Crosslink</title>
</head>

<body>
  <div id="root">
    <div id="titlebar">
      <h1>Crosslink</h1>
    </div>
    <div id="topbar">
      <button id="start">Start</button>
      <button id="stop" disabled>Stop</button>
      <button id="step">Step</button>
      <button id="clear">Clear</button>
      <button id="undo" disabled>Undo</button>
      <button id="redo" disabled>Redo</button>
      <input type="range" id="tick-slider" min="0" max="1" step="0.001" value="0.5">
    </div>

    <div id="workspace">
      <div id="palette">
        <!-- data-type should be the actual class in ts -->
        <div class="palette-section">
          <div class="palette-header">Logic</div>
          <div class="palette-items">
            <div class="palette-item" data-type="NotGate">NOT Gate</div>
            <div class="palette-item" data-type="AndGate">AND Gate</div>
            <div class="palette-item" data-type="OrGate">OR Gate</div>
            <div class="palette-item" data-type="XorGate">XOR Gate</div>
            <div class="palette-item" data-type="NandGate">NAND Gate</div>
            <div class="palette-item" data-type="NorGate">NOR Gate</div>
            <div class="palette-item" data-type="XnorGate">XNOR Gate</div>
          </div>
        </div>

        <div class="palette-section">
          <div class="palette-header">IO</div>
          <div class="palette-items">
            <div class="palette-item" data-type="InputPin">Input</div>
            <div class="palette-item" data-type="OutputPin">Output</div>
            <div class="palette-item" data-type="Clock">Clock</div>
          </div>
        </div>

        <div class="palette-section">
          <div class="palette-header">Memory</div>
          <div class="palette-items">
            <div class="palette-item" data-type="SRLatch">SR Latch</div>
            <div class="palette-item" data-type="DFlipFlop">D Flip-Flop</div>
            <div class="palette-item" data-type="TFlipFlop">T Flip-Flop</div>
          </div>
        </div>

        <div class="palette-section">
          <div class="palette-header">Custom</div>
          <div class="palette-items">
            <!-- dynamically filled later -->
          </div>
        </div>
      </div>

      <div id="editor">
        <canvas id="sim-canvas"></canvas>
      </div>
    </div>
  </div>

  <div id="modal">
    <div id="modalContent">
      <label id="modalLabel">Enter value:</label>
      <input type="text" id="modalInput" />
      <div id="modalButtons">
        <button id="modalOk">OK</button>
        <button id="modalCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
